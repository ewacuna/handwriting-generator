<div class="flex-1 flex justify-center mb-4">
  <div
    class="inline-flex rounded-md shadow-sm bg-gray-100"
    role="group"
    [attr.aria-label]="'settings.languageSelector' | translate"
  >
    <button
      type="button"
      class="px-3 py-2 text-sm font-medium text-gray-700 hover:bg-primary hover:text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-800 focus-visible:ring-offset-2 rounded-l-md transition"
      [attr.aria-label]="'settings.english' | translate"
      [attr.aria-pressed]="currentLanguage() === 'en'"
      [class.bg-primary]="currentLanguage() === 'en'"
      [class.text-white]="currentLanguage() === 'en'"
      (click)="changeLanguage('en')"
    >
      EN
    </button>
    <button
      type="button"
      class="px-3 py-2 text-sm font-medium text-gray-700 hover:bg-primary hover:text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-800 focus-visible:ring-offset-2 rounded-r-md transition"
      [attr.aria-label]="'settings.spanish' | translate"
      [attr.aria-pressed]="currentLanguage() === 'es'"
      [class.bg-primary]="currentLanguage() === 'es'"
      [class.text-white]="currentLanguage() === 'es'"
      (click)="changeLanguage('es')"
    >
      ES
    </button>
  </div>
  <span class="sr-only" aria-live="polite">
    {{ "settings.selectedLanguage" | translate }}
    @if (currentLanguage() === 'en') {
      {{ "settings.english" | translate }}
    } @else {
      {{ "settings.spanish" | translate }}
    }
  </span>
</div>
